name: Fábrica_de_Lucro_02

on:
  schedule:
    - cron: '15 * * * *'  # Roda aos 15 minutos de cada hora
  workflow_dispatch:      # Permite rodar manualmente pelo botão

jobs:
  trabalhar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Executar Minerador
        env:
          STREAMR_PRIVATE_KEY: ${{ secrets.STREAMR_PRIVATE_KEY }}
        run: python bot_vitoria.py
