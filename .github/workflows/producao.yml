name: Fabrica_de_Lucro_02
on:
  schedule:
    - cron: '15 * * * *' # Bate o ponto aos 15 minutos de cada hora
  workflow_dispatch:
jobs:
  trabalhar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Executar Minerador
        env:
          STREAMR_PRIVATE_KEY: ${{ secrets.STREAMR_PRIVATE_KEY }}
        run: python bot_vitoria.py

